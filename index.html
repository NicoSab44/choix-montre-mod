<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurateur de Montre NH Seiko</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .watch-card { transition: all 0.3s ease; }
        .watch-card.active { @apply ring-2 ring-yellow-400 scale-105; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans">

<header class="text-center mb-12">
    <h1 class="text-4xl font-bold text-yellow-400 uppercase tracking-widest mb-2">Seiko Mod Studio</h1>
    <p class="text-gray-400 text-lg">Créez votre montre automatique personnalisée (Série NH)</p>
</header>

<div class="max-w-7xl mx-auto px-4">
    <!-- Section Mouvements -->
    <div class="mb-12">
        <h2 class="text-2xl font-bold text-yellow-400 mb-6 flex items-center gap-3">
            <i class="fa-solid fa-gear"></i> Mouvement (Calibre)
        </h2>
        <select id="mouvement-select" class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg text-white hover:border-yellow-400 focus:border-yellow-400 focus:ring-2 focus:ring-yellow-400">
            <option value="NH34" data-description="https://images.unsplash.com/photo-1523170335258-f5ed11844a49?w=300&h=300&fit=crop">NH34 (GMT) - GMT - 4 aiguilles (2ème fuseau horaire)</option>
            <option value="NH35" data-description="https://images.unsplash.com/photo-1504384308090-c894fdcc538d?w=300&h=300&fit=crop">NH35 (Date) - Date à 3h - Le plus populaire</option>
            <option value="NH36" data-description="https://images.unsplash.com/photo-1611591437281-460bfbe1220a?w=300&h=300&fit=crop">NH36 (Day-Date) - Jour & Date - Très fonctionnel</option>
            <option value="NH38" data-description="https://images.unsplash.com/photo-1535632066927-ab7c9ab60908?w=300&h=300&fit=crop">NH38 (Skeleton) - Open Heart - On voit le mécanisme</option>
        </select>
    </div>

    <!-- Section Boîtiers -->
    <div class="mb-12">
        <h2 class="text-2xl font-bold text-yellow-400 mb-6 flex items-center gap-3">
            <i class="fa-solid fa-circle"></i> Style de Boîtier
        </h2>
        <select id="boitier-select" class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg text-white hover:border-yellow-400 focus:border-yellow-400 focus:ring-2 focus:ring-yellow-400">
            <option value="Diver" data-description="https://images.unsplash.com/photo-1610877692220-26bfb6288b51?w=300&h=300&fit=crop">Diver - Plongeuse - Submariner Style</option>
            <option value="Dress" data-description="https://images.unsplash.com/photo-1552209285-50be2c177e86?w=300&h=300&fit=crop">Dress - Habillée - Oyster / Datejust</option>
            <option value="Field" data-description="https://images.unsplash.com/photo-1617635937083-14ec9a4fb3fb?w=300&h=300&fit=crop">Field - Militaire - Brossé / Tactique</option>
            <option value="Sport" data-description="https://images.unsplash.com/photo-1578762421146-f14f3e8a6b0a?w=300&h=300&fit=crop">Sport - Sport-Chic - Style Integrated</option>
        </select>
    </div>

    <!-- Section Cadrans -->
    <div class="mb-12">
        <h2 class="text-2xl font-bold text-yellow-400 mb-6 flex items-center gap-3">
            <i class="fa-solid fa-palette"></i> Couleur du Cadran
        </h2>
        <select id="cadran-select" class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg text-white hover:border-yellow-400 focus:border-yellow-400 focus:ring-2 focus:ring-yellow-400">
            <option value="Noir Mat" data-description="https://images.unsplash.com/photo-1534308983496-4674a6db6d2b?w=300&h=300&fit=crop">Noir Mat - Classique intemporel</option>
            <option value="Bleu Soleillé" data-description="https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=300&h=300&fit=crop">Bleu Soleillé - Élégant et moderne</option>
            <option value="Vert Forêt" data-description="https://images.unsplash.com/photo-1479365365737-022fac910d6f?w=300&h=300&fit=crop">Vert Forêt - Tendance actuelle</option>
            <option value="Argent" data-description="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=300&h=300&fit=crop">Argent / Blanc - Vintage raffiné</option>
        </select>
    </div>

    <!-- Section Aiguilles -->
    <div class="mb-12">
        <h2 class="text-2xl font-bold text-yellow-400 mb-6 flex items-center gap-3">
            <i class="fa-solid fa-clock"></i> Aiguilles
        </h2>
        <select id="aiguilles-select" class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg text-white hover:border-yellow-400 focus:border-yellow-400 focus:ring-2 focus:ring-yellow-400">
            <option value="Mercedes" data-description="https://images.unsplash.com/photo-1585386959984-2905db51daa0?w=300&h=300&fit=crop">Mercedes - Iconique classique</option>
            <option value="Bâtons" data-description="https://images.unsplash.com/photo-1569495846287-d81619bcaf36?w=300&h=300&fit=crop">Bâtons - Modernes épurés</option>
            <option value="Cathédrale" data-description="https://images.unsplash.com/photo-1531804312915-c3400ca199e7?w=300&h=300&fit=crop">Cathédrale - Rétro vintage</option>
        </select>
    </div>

    <!-- Section Bracelets -->
    <div class="mb-12">
        <h2 class="text-2xl font-bold text-yellow-400 mb-6 flex items-center gap-3">
            <i class="fa-solid fa-link"></i> Bracelet
        </h2>
        <select id="bracelet-select" class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg text-white hover:border-yellow-400 focus:border-yellow-400 focus:ring-2 focus:ring-yellow-400">
            <option value="Acier" data-description="https://images.unsplash.com/photo-1599643478518-a784e5dc4c8f?w=300&h=300&fit=crop">Acier 316L - Oyster élégant</option>
            <option value="Cuir" data-description="https://images.unsplash.com/photo-1523293182086-7651a899d37f?w=300&h=300&fit=crop">Cuir Italien - Brun / Noir</option>
            <option value="NATO" data-description="https://images.unsplash.com/photo-1606642945446-418736b40302?w=300&h=300&fit=crop">Nylon NATO - Sport militaire</option>
            <option value="FKM Rubber" data-description="https://images.unsplash.com/photo-1516062423079-7ca13cdc7f5a?w=300&h=300&fit=crop">Caoutchouc FKM - Plongée technique</option>
        </select>
    </div>

    <!-- Preview Section -->
    <div class="sticky top-20 bg-gradient-to-b from-gray-800 to-gray-900 p-8 rounded-xl border-2 border-yellow-400 shadow-2xl mb-8">
        <h3 class="text-2xl font-bold text-yellow-400 mb-6">Votre Configuration</h3>
        
        <div id="summary" class="bg-gray-900 rounded-lg p-6 mb-6 space-y-4">
            <div class="flex justify-between border-b border-gray-700 pb-3">
                <span class="text-gray-400">Moteur :</span>
                <strong id="summary-mouvement" class="text-yellow-400">NH34</strong>
            </div>
            <div class="flex justify-between border-b border-gray-700 pb-3">
                <span class="text-gray-400">Style :</span>
                <strong id="summary-boitier" class="text-yellow-400">Diver</strong>
            </div>
            <div class="flex justify-between border-b border-gray-700 pb-3">
                <span class="text-gray-400">Cadran :</span>
                <strong id="summary-cadran" class="text-yellow-400">Noir Mat</strong>
            </div>
            <div class="flex justify-between border-b border-gray-700 pb-3">
                <span class="text-gray-400">Aiguilles :</span>
                <strong id="summary-aiguilles" class="text-yellow-400">Mercedes</strong>
            </div>
            <div class="flex justify-between">
                <span class="text-gray-400">Bracelet :</span>
                <strong id="summary-bracelet" class="text-yellow-400">Acier</strong>
            </div>
        </div>

        <a id="ali-link" href="#" target="_blank" class="block w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-6 rounded-lg text-center transition-all duration-300">
            <i class="fa-solid fa-shopping-cart mr-2"></i>Trouver les pièces sur AliExpress
        </a>
    </div>
</div>

<script>
    // État du configurateur
    let config = {
        mouvement: 'NH34',
        boitier: 'Diver',
        cadran: 'Noir Mat',
        aiguilles: 'Mercedes',
        bracelet: 'Acier'
    };

    // Initialiser les gestionnaires d'événements
    function initEventListeners() {
        // Mouvement
        document.querySelectorAll('#mouvement-options .watch-card').forEach(card => {
            card.addEventListener('click', function() {
                selectCard(this, 'mouvement', '#mouvement-options');
            });
        });

        // Boîtier
        document.querySelectorAll('#boitier-options .watch-card').forEach(card => {
            card.addEventListener('click', function() {
                selectCard(this, 'boitier', '#boitier-options');
            });
        });

        // Cadran
        document.querySelectorAll('#cadran-options .watch-card').forEach(card => {
            card.addEventListener('click', function() {
                selectCard(this, 'cadran', '#cadran-options');
            });
        });

        // Aiguilles
        document.querySelectorAll('#aiguilles-options .watch-card').forEach(card => {
            card.addEventListener('click', function() {
                selectCard(this, 'aiguilles', '#aiguilles-options');
            });
        });

        // Bracelet
        document.querySelectorAll('#bracelet-options .watch-card').forEach(card => {
            card.addEventListener('click', function() {
                selectCard(this, 'bracelet', '#bracelet-options');
            });
        });
    }

    function selectCard(card, configKey, containerSelector) {
        // Retirer la classe active de tous les cartes du conteneur
        document.querySelectorAll(`${containerSelector} .watch-card`).forEach(c => {
            c.classList.remove('active');
        });
        
        // Ajouter la classe active à la carte cliquée
        card.classList.add('active');
        
        // Mettre à jour la configuration
        config[configKey] = card.dataset.value;
        
        // Mettre à jour l'aperçu
        updatePreview();
    }

    function updatePreview() {
        // Mettre à jour le résumé
        document.getElementById('summary-mouvement').textContent = config.mouvement;
        document.getElementById('summary-boitier').textContent = config.boitier;
        document.getElementById('summary-cadran').textContent = config.cadran;
        document.getElementById('summary-aiguilles').textContent = config.aiguilles;
        document.getElementById('summary-bracelet').textContent = config.bracelet;

        // Mettre à jour le lien AliExpress
        const searchQuery = `Seiko mod case ${config.boitier} dial ${config.cadran}`;
        document.getElementById('ali-link').href = `https://www.aliexpress.com/w/wholesale-${encodeURIComponent(searchQuery)}.html`;

        // Animation
        const summary = document.getElementById('summary');
        summary.style.animation = 'none';
        setTimeout(() => {
            summary.style.animation = 'pulse 0.5s ease-in-out';
        }, 10);
    }

    // Initialiser
    initEventListeners();
    updatePreview();
</script>
</body>
</html>
