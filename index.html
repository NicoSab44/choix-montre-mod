<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurateur de Montre NH Seiko</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --dark-bg: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-light: #e0e0e0;
            --accent: #3498db;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-light);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 { color: var(--gold); text-transform: uppercase; letter-spacing: 2px; }

        .config-section {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .option-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 10px; font-weight: bold; color: var(--gold); }

        select {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #444;
            background: #1a1a1a;
            color: white;
            cursor: pointer;
        }

        /* Preview Card */
        .preview-card {
            background: linear-gradient(145deg, #2d2d2d, #1a1a1a);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid var(--gold);
            position: sticky;
            top: 20px;
            text-align: center;
        }

        .watch-visual {
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            color: var(--gold);
            margin-bottom: 20px;
            border: 2px dashed #444;
            border-radius: 50%;
            width: 250px;
            margin: 0 auto 20px auto;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #444;
            padding: 10px 0;
        }

        .btn-ali {
            display: block;
            margin-top: 25px;
            padding: 15px;
            background: #ff4747;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-ali:hover { background: #e03636; }

        .info-tag {
            font-size: 0.8em;
            color: #888;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<header>
    <h1>Seiko Mod Studio</h1>
    <p>Créez votre montre automatique personnalisée (Série NH)</p>
</header>

<div class="container">
    <div class="config-section">
        <div class="option-group">
            <label><i class="fa-solid fa-gear"></i> Mouvement (Calibre)</label>
            <select id="mouvement" onchange="updatePreview()">
                <option value="NH34" data-desc="GMT - 4 aiguilles (2ème fuseau horaire)">Seiko NH34 (GMT)</option>
                <option value="NH35" data-desc="Date à 3h - Le plus populaire">Seiko NH35 (Date)</option>
                <option value="NH36" data-desc="Jour & Date - Très fonctionnel">Seiko NH36 (Day-Date)</option>
                <option value="NH38" data-desc="Open Heart - On voit le mécanisme">Seiko NH38 (Skeleton/No Date)</option>
            </select>
            <div id="desc-mouv" class="info-tag">GMT - 4 aiguilles (2ème fuseau horaire)</div>
        </div>

        <div class="option-group">
            <label><i class="fa-solid fa-circle"></i> Style de Boîtier</label>
            <select id="boitier" onchange="updatePreview()">
                <option value="Diver">Plongeuse (Submariner Style)</option>
                <option value="Dress">Habillée (Oyster / Datejust)</option>
                <option value="Field">Militaire (Brossé / Tactique)</option>
                <option value="Sport">Sport-Chic (Style Integrated)</option>
            </select>
        </div>

        <div class="option-group">
            <label><i class="fa-solid fa-palette"></i> Couleur du Cadran</label>
            <select id="cadran" onchange="updatePreview()">
                <option value="Noir Mat">Noir Mat (Classique)</option>
                <option value="Bleu Soleillé">Bleu Soleillé (Élégant)</option>
                <option value="Vert Forêt">Vert Forêt (Tendance)</option>
                <option value="Argent">Argent / Blanc (Vintage)</option>
            </select>
        </div>

        <div class="option-group">
            <label><i class="fa-solid fa-clock"></i> Aiguilles</label>
            <select id="aiguilles" onchange="updatePreview()">
                <option value="Mercedes">Mercedes (Iconique)</option>
                <option value="Bâtons">Bâtons (Modernes)</option>
                <option value="Cathédrale">Cathédrale (Rétro)</option>
            </select>
        </div>

        <div class="option-group">
            <label><i class="fa-solid fa-link"></i> Bracelet</label>
            <select id="bracelet" onchange="updatePreview()">
                <option value="Acier">Acier 316L (Oyster)</option>
                <option value="Cuir">Cuir Italien (Brun/Noir)</option>
                <option value="NATO">Nylon NATO (Sport/Militaire)</option>
                <option value="FKM Rubber">Caoutchouc FKM (Plongée)</option>
            </select>
        </div>
    </div>

    <div class="preview-card">
        <h3>Votre Configuration</h3>
        <div class="watch-visual" id="watch-icon">
            <i class="fa-solid fa-stopwatch"></i>
        </div>
        
        <div id="summary">
            </div>

        <a id="ali-link" href="#" target="_blank" class="btn-ali">
            Trouver les pièces sur AliExpress
        </a>
    </div>
</div>

<script>
    function updatePreview() {
        const mouv = document.getElementById('mouvement');
        const boitier = document.getElementById('boitier').value;
        const cadran = document.getElementById('cadran').value;
        const aiguilles = document.getElementById('aiguilles').value;
        const bracelet = document.getElementById('bracelet').value;

        // Mise à jour de la description du mouvement
        document.getElementById('desc-mouv').innerText = mouv.options[mouv.selectedIndex].getAttribute('data-desc');

        // Mise à jour du résumé
        const summaryHTML = `
            <div class="summary-item"><span>Moteur :</span> <strong>${mouv.value}</strong></div>
            <div class="summary-item"><span>Style :</span> <strong>${boitier}</strong></div>
            <div class="summary-item"><span>Cadran :</span> <strong>${cadran}</strong></div>
            <div class="summary-item"><span>Aiguilles :</span> <strong>${aiguilles}</strong></div>
            <div class="summary-item"><span>Bracelet :</span> <strong>${bracelet}</strong></div>
        `;
        document.getElementById('summary').innerHTML = summaryHTML;

        // Mise à jour du lien AliExpress
        const searchQuery = `Seiko mod case ${boitier} dial ${cadran} NH${mouv.value.slice(-2)} hands ${aiguilles}`;
        document.getElementById('ali-link').href = `https://www.aliexpress.com/w/wholesale-${encodeURIComponent(searchQuery)}.html`;

        // Animation de l'icône
        const icon = document.getElementById('watch-icon');
        icon.style.transform = "scale(1.05)";
        setTimeout(() => icon.style.transform = "scale(1)", 200);
    }

    // Init
    updatePreview();
</script>

</body>
</html>
